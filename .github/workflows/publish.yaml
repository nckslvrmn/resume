# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build PDF
        run: |
          python3 -m http.server 8000 --directory src &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8000/index.html >/dev/null && break
            sleep 0.2
          done
          CHROME=$(command -v google-chrome || command -v chromium-browser || command -v chromium || true)
          if [ -z "$CHROME" ]; then
            echo "Chrome is required to build the PDF"
            exit 1
          fi
          "$CHROME" --headless=new --disable-gpu --no-sandbox --run-all-compositor-stages-before-draw --virtual-time-budget=5000 --no-pdf-header-footer --print-to-pdf="$PWD/src/resume.pdf" "http://127.0.0.1:8000/index.html?pdf=1"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "src"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  clean:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
      deployments: write
    steps:
      - name: clean old deployments and runs
        uses: nckslvrmn/github_cleaner@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
